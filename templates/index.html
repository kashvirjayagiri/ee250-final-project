<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BrewView Dashboard</title>
    <style>
        :root {
            --bg: #f7f2ea;
            --panel: rgba(255, 252, 247, 0.84);
            --panel-strong: #fffaf4;
            --text: #251d18;
            --muted: #7a6c61;
            --occupied-bg: #f6e4df;
            --vacant-bg: #edf4dc;
            --shadow: 0 18px 50px rgba(69, 47, 23, 0.08);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Georgia, "Times New Roman", serif;
            color: var(--text);
            background:
                radial-gradient(circle at top left, rgba(121, 173, 57, 0.12), transparent 28rem),
                radial-gradient(circle at top right, rgba(111, 104, 213, 0.08), transparent 26rem),
                linear-gradient(180deg, #fbf8f2 0%, var(--bg) 100%);
        }

        .shell {
            width: min(1180px, calc(100vw - 32px));
            margin: 22px auto;
            padding: 22px;
            border: 1px solid rgba(85, 57, 28, 0.08);
            border-radius: 26px;
            background: var(--panel);
            box-shadow: var(--shadow);
            backdrop-filter: blur(14px);
        }

        .topbar,
        .metrics,
        .floor-map {
            display: grid;
            gap: 16px;
        }

        .topbar {
            grid-template-columns: 1fr auto;
            align-items: center;
            margin-bottom: 26px;
        }

        .brand h1 {
            margin: 0;
            font-size: clamp(2rem, 4vw, 2.65rem);
            font-weight: 600;
            letter-spacing: -0.04em;
        }

        .brand p {
            margin: 6px 0 0;
            color: var(--muted);
            font-size: 0.98rem;
        }

        .live-pill {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 10px 16px;
            border-radius: 999px;
            background: #edf4dc;
            color: #6a8f2d;
            font-weight: 600;
            box-shadow: inset 0 0 0 1px rgba(115, 156, 53, 0.12);
        }

        .live-pill::before {
            content: "";
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: currentColor;
            box-shadow: 0 0 0 8px rgba(115, 156, 53, 0.13);
        }

        .metrics {
            grid-template-columns: repeat(3, minmax(0, 1fr));
            margin-bottom: 30px;
        }

        .metric-card,
        .panel {
            padding: 20px;
            border-radius: 22px;
            border: 1px solid rgba(85, 57, 28, 0.06);
            background: var(--panel-strong);
            box-shadow: 0 8px 28px rgba(69, 47, 23, 0.04);
        }

        .metric-label,
        .section-label {
            margin: 0 0 8px;
            color: var(--muted);
            font-size: 0.82rem;
            letter-spacing: 0.16em;
            text-transform: uppercase;
        }

        .metric-value {
            margin: 0;
            font-size: clamp(2rem, 3vw, 2.8rem);
            line-height: 0.95;
        }

        .metric-subtext {
            margin: 8px 0 0;
            color: var(--muted);
            font-size: 1rem;
        }

        .section-title {
            margin: 0 0 16px;
            font-size: 1.45rem;
            letter-spacing: -0.02em;
        }

        .floor-map {
            grid-template-columns: repeat(3, minmax(0, 1fr));
        }

        .table-card {
            position: relative;
            overflow: hidden;
            min-height: 176px;
            padding: 18px;
            border-radius: 22px;
            border: 1px solid rgba(85, 57, 28, 0.06);
            transition: transform 180ms ease, box-shadow 180ms ease;
        }

        .table-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 16px 34px rgba(69, 47, 23, 0.08);
        }

        .table-card.occupied {
            background: linear-gradient(180deg, rgba(255,255,255,0.55), transparent), var(--occupied-bg);
            color: #7f463e;
        }

        .table-card.vacant {
            background: linear-gradient(180deg, rgba(255,255,255,0.55), transparent), var(--vacant-bg);
            color: #597b2e;
        }

        .table-name {
            margin: 0 0 10px;
            font-size: 1.4rem;
        }

        .reading {
            margin: 0;
            font-size: 1rem;
            opacity: 0.86;
        }

        .status {
            margin: 14px 0 0;
            font-size: 1.16rem;
            font-weight: 700;
        }

        .table-tag {
            position: absolute;
            right: 16px;
            top: 16px;
            padding: 6px 10px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.58);
            font-size: 0.82rem;
            font-weight: 600;
        }

        .empty-state {
            padding: 18px;
            border-radius: 18px;
            border: 1px dashed rgba(85, 57, 28, 0.18);
            color: var(--muted);
            background: rgba(255, 255, 255, 0.42);
        }

        @media (max-width: 920px) {
            .metrics,
            .floor-map {
                grid-template-columns: 1fr;
            }

            .shell {
                width: min(100vw - 18px, 100%);
                margin: 10px auto;
                padding: 16px;
            }

            .topbar {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <main class="shell">
        <header class="topbar">
            <div class="brand">
                <h1>BrewView</h1>
                <p>Cafe floor live dashboard</p>
            </div>
            <div class="live-pill">Live</div>
        </header>

        <section class="metrics">
            <article class="metric-card">
                <p class="metric-label">Tables occupied</p>
                <h2 class="metric-value" id="occupiedMetric">0 / 0</h2>
                <p class="metric-subtext" id="occupancyPercent">Waiting for data</p>
            </article>
            <article class="metric-card">
                <p class="metric-label">Average threshold</p>
                <h2 class="metric-value" id="thresholdMetric">--</h2>
                <p class="metric-subtext" id="thresholdLabel">Waiting for threshold data</p>
            </article>
            <article class="metric-card">
                <p class="metric-label">Last updated</p>
                <h2 class="metric-value" id="updatedMetric">--</h2>
                <p class="metric-subtext">Updates every 2 seconds</p>
            </article>
        </section>

        <section class="panel">
            <p class="section-label">Floor map</p>
            <h3 class="section-title">Live table states</h3>
            <div class="floor-map" id="floorMap"></div>
        </section>
    </main>

    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js" crossorigin="anonymous"></script>
    <script>
        const occupiedMetric = document.getElementById("occupiedMetric");
        const occupancyPercent = document.getElementById("occupancyPercent");
        const thresholdMetric = document.getElementById("thresholdMetric");
        const thresholdLabel = document.getElementById("thresholdLabel");
        const updatedMetric = document.getElementById("updatedMetric");
        const floorMap = document.getElementById("floorMap");

        let latestTables = [];

        function sortTables(entries) {
            return [...entries].sort((left, right) => String(left.table_id).localeCompare(String(right.table_id)));
        }

        function formatTableName(tableId) {
            return String(tableId)
                .replace(/[_-]+/g, " ")
                .replace(/\b\w/g, (char) => char.toUpperCase());
        }

        function formatDistance(value) {
            if (value === null || value === undefined || Number.isNaN(Number(value))) {
                return "No distance data";
            }
            return `${Number(value).toFixed(1)} cm`;
        }

        function formatThreshold(value) {
            if (value === null || value === undefined || Number.isNaN(Number(value))) {
                return "--";
            }
            return `${Math.round(Number(value))} cm`;
        }

        function formatRelativeTime(isoString) {
            const date = new Date(isoString);
            if (Number.isNaN(date.getTime())) {
                return "--";
            }

            const diffSeconds = Math.max(0, Math.round((Date.now() - date.getTime()) / 1000));
            if (diffSeconds < 5) {
                return "just now";
            }
            if (diffSeconds < 60) {
                return `${diffSeconds}s ago`;
            }
            if (diffSeconds < 3600) {
                return `${Math.round(diffSeconds / 60)}m ago`;
            }
            return date.toLocaleTimeString([], { hour: "numeric", minute: "2-digit" });
        }

        function renderMetrics(current) {
            const occupiedCount = current.filter((entry) => entry.occupied).length;
            const totalTables = current.length;
            const occupancy = totalTables ? Math.round((occupiedCount / totalTables) * 100) : 0;

            occupiedMetric.textContent = `${occupiedCount} / ${totalTables}`;
            occupancyPercent.textContent = totalTables ? `${occupancy}% occupancy` : "Waiting for table data";

            const thresholdValues = current
                .map((entry) => Number(entry.threshold))
                .filter((value) => !Number.isNaN(value));
            const averageThreshold = thresholdValues.length
                ? thresholdValues.reduce((sum, value) => sum + value, 0) / thresholdValues.length
                : null;

            thresholdMetric.textContent = averageThreshold === null ? "--" : `${Math.round(averageThreshold)} cm`;
            thresholdLabel.textContent = thresholdValues.length
                ? `Average across ${thresholdValues.length} table${thresholdValues.length === 1 ? "" : "s"}`
                : "Waiting for threshold data";

            const timestamps = current.map((entry) => entry.timestamp).filter(Boolean).sort();
            updatedMetric.textContent = timestamps.length ? formatRelativeTime(timestamps[timestamps.length - 1]) : "--";
        }

        function renderFloorMap(current) {
            if (!current.length) {
                floorMap.innerHTML = '<div class="empty-state">No table updates yet. Start the sensor pipeline and this view will populate automatically.</div>';
                return;
            }

            floorMap.innerHTML = current.map((entry) => {
                const occupiedClass = entry.occupied ? "occupied" : "vacant";
                const statusText = entry.occupied ? "Occupied" : "Vacant";
                const tagText = `Threshold ${formatThreshold(entry.threshold)}`;
                return `
                    <article class="table-card ${occupiedClass}">
                        <span class="table-tag">${tagText}</span>
                        <h4 class="table-name">${formatTableName(entry.table_id)}</h4>
                        <p class="reading">Raw distance: ${formatDistance(entry.distance_cm)}</p>
                        <p class="reading">Updated ${formatRelativeTime(entry.timestamp)}</p>
                        <p class="status">${statusText}</p>
                    </article>
                `;
            }).join("");
        }

        function renderDashboard(current) {
            const sorted = sortTables(current);
            renderMetrics(sorted);
            renderFloorMap(sorted);
        }

        function setTableSnapshot(entries) {
            latestTables = Array.isArray(entries) ? entries : [];
            renderDashboard(latestTables);
        }

        function mergeTableUpdate(entry) {
            if (!entry || !entry.table_id) {
                return;
            }

            const byTableId = new Map(latestTables.map((table) => [table.table_id, table]));
            byTableId.set(entry.table_id, entry);
            latestTables = Array.from(byTableId.values());
            renderDashboard(latestTables);
        }

        async function fetchJson(url) {
            const response = await fetch(url, { cache: "no-store" });
            if (!response.ok) {
                throw new Error(`Request failed for ${url}: ${response.status}`);
            }
            return response.json();
        }

        async function refreshDashboard() {
            try {
                const current = await fetchJson("/api/current");
                setTableSnapshot(current);
            } catch (error) {
                console.error(error);
            }
        }

        function setupLiveUpdates() {
            if (!window.io) {
                return;
            }

            const socket = window.io();
            socket.on("initial_state", setTableSnapshot);
            socket.on("occupancy_update", mergeTableUpdate);
            socket.on("connect_error", () => {
                console.warn("Socket.IO unavailable, continuing with polling only.");
            });
        }

        refreshDashboard();
        setupLiveUpdates();
        window.setInterval(refreshDashboard, 2000);
    </script>
</body>
</html>
